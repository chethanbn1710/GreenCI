stages:
  - build
  - test
  - security
  - deploy

build_backend:
  stage: build
  script:
    - cd backend
    - docker build -t task-backend .
  artifacts:
    paths:
      - backend

test_backend:
  stage: test
  script:
    - cd backend
    - npm install
    - npm test

security_scan:
  stage: security
  script:
    - cd backend
    - npm audit --audit-level=high

deploy_production:
  stage: deploy
  script:
    - docker run -d -p 5000:5000 task-backend
  only:
    - main