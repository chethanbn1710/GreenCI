<!DOCTYPE html>
<html>
<head>
  <title>GreenCI Dashboard</title>

  <style>
    body {
      font-family: "Consolas", monospace;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 25px;
    }

    h1 {
      text-align: center;
      color: #22c55e;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .board {
      display: flex;
      gap: 20px;
    }

    .lane {
      flex: 1;
      background: #111827;
      border-radius: 10px;
      padding: 15px;
      position: relative;
      min-height: 300px;
      border: 1px solid #1f2937;
    }

    /* Neon divider lines */
    .lane:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 10px;
      right: -10px;
      height: 95%;
      border-right: 1px dashed #334155;
    }

    .lane h2 {
      text-align: center;
      color: #38bdf8;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .card {
      background: #020617;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border-left: 3px solid #64748b;
      transition: 0.2s;
    }

    .card:hover {
      background: #020617;
      transform: scale(1.02);
    }

    .meta {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .stage {
      font-size: 11px;
      margin-top: 3px;
      padding-left: 6px;
    }

    .running { color: #f59e0b; }
    .completed { color: #22c55e; }
    .failed { color: #ef4444; }
    .pending { color: #64748b; }

    .status-message {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<h1>⚙️ GreenCI Control Board</h1>

<div class="board">

  <div class="lane">
    <h2>📥 Queue</h2>
    <div id="queued"></div>
  </div>

  <div class="lane">
    <h2>⚡ Active</h2>
    <div id="running"></div>
  </div>

  <div class="lane">
    <h2>✅ Done</h2>
    <div id="completed"></div>
  </div>

</div>

<div id="status" class="status-message"></div>

<script>

function getBorderColor(status) {
  if (status === "RUNNING") return "#f59e0b";
  if (status === "COMPLETED") return "#22c55e";
  if (status === "FAILED") return "#ef4444";
  return "#64748b";
}

async function loadJobs() {
  try {
    const res = await fetch("http://localhost:7000/jobs");
    const jobs = await res.json();

    document.getElementById("status").innerText = "";

    document.getElementById("queued").innerHTML = "";
    document.getElementById("running").innerHTML = "";
    document.getElementById("completed").innerHTML = "";

    jobs.forEach(job => {

      const card = document.createElement("div");
      card.className = "card";
      card.style.borderLeft = `3px solid ${getBorderColor(job.status)}`;

      let stages = "";

      if (job.stages) {
        job.stages.forEach(stage => {

          let cls = "pending";
          if (stage.status === "RUNNING") cls = "running";
          if (stage.status === "COMPLETED") cls = "completed";
          if (stage.status === "FAILED") cls = "failed";

          stages += `
            <div class="stage ${cls}">
              ${stage.name}: ${stage.status}
            </div>
          `;
        });
      }

      card.innerHTML = `
        <b>#${job.id}</b> ${job.repo} [${job.branch}]

        <div class="meta">
          ${job.language || "N/A"} • ${job.workerId || "Unassigned"}<br>
          ${job.status}
        </div>

        ${stages}
      `;

      if (job.status === "QUEUED" || job.status === "WAITING_FOR_WORKER") {
        document.getElementById("queued").appendChild(card);
      }

      if (job.status === "RUNNING") {
        document.getElementById("running").appendChild(card);
      }

      if (job.status === "COMPLETED") {
        document.getElementById("completed").appendChild(card);
      }

    });

  } catch (err) {
    document.getElementById("status").innerText = "⏳ Waiting for backend (localhost:7000)...";
    console.log("Waiting for backend...");
  }
}

setInterval(loadJobs, 1500);

</script>

</body>
</html>
