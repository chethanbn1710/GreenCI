<!DOCTYPE html>
<html>
<head>

  <title>GreenCI Operations Grid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Consolas;
      background: black;
      color: white;
      overflow-x: hidden;
      height: 100vh;
    }


    /* ================= SPLASH SCREEN ================= */
    #splash {
      position: fixed;
      inset: 0;
      background: url("/images/splash.png") center center no-repeat;
      background-size: contain;
      background-color: black;
      z-index: 9999;
      transition: opacity 1s ease;
    }


    /* ================= MAIN DASHBOARD ================= */
    #dashboard {
      position: fixed;
      inset: 0;
      background: url("/images/main_bg.png") center center no-repeat;
      background-size: contain;
      background-color: black;
      opacity: 0;
      background-position: center 28%;
      transition: 
        opacity 1.5s ease,
        background 1.2s ease;
    }

  
    /* ================= STATUS TILE ================= */
    #statusTile {
      position: fixed;
      top: 25px;
      right: 40px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px);
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
    }


    /* ================= JOB COUNTER TILE ================= */
    #totalJobsTile {
      position: fixed;
      bottom: 40px;
      left: 40px;
      background: black;
      padding: 15px 28px;
      border-radius: 12px;
    }


    /* ================= DETAIL BUTTON ================= */
    #detailBtn {
      position: fixed;
      bottom: 40px;
      right: 40px;
      background: black;
      padding: 15px 28px;
      border-radius: 12px;
      cursor: pointer;
    }


    /* ================= QUOTE ================= */
    #quote {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 15px;
      opacity: .85;
    }


    /* ================= GRID ================= */
    .grid {
      position: absolute;
      top: 67%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 90px;
      align-items: center;
    }


    /* ================= CARDS ================= */
    .card {
      width: 180px;
      height: 330px;
      border-radius: 16px;
      padding: 18px;
      background-size: cover;
      background-position: center;
      position: relative;
      transition:
        transform 1s ease,
        opacity 1s ease,
        background 1.2s ease;
      opacity: 0;
      transform: translateY(100px);
      overflow:hidden;
    }

    /* placeholders for your tile artwork */
    #queue {
      background: url("/images/dashboard_tiles/queue_tile.png") center/cover;
    }

    #active {
      background: url("/images/dashboard_tiles/active_tile.png") center/cover;
    }

    #done {
      background: url("/images/dashboard_tiles/done_tile.png") center/cover;
    }


    .detail-mode #dashboard{
      background:url("/images/detail_bg.png") center/cover;
    }
    
    .detail-mode #queue{
      background:url("/images/detail_tiles/queue.png") center/cover;
    }
    
    .detail-mode #active{
      background:url("/images/detail_tiles/active.png") center/cover;
    }
    
    .detail-mode #done{
      background:url("/images/detail_tiles/done.png") center/cover;
    }

    .detail-mode #statusTile,
.detail-mode #totalJobsTile,
.detail-mode #detailBtn {
  display: none;
}

    /* animate entry */
    .show {
      opacity: 1;
      transform: translateY(0);
    }


    /* ================= COUNTS ================= */
    .count {
      font-size: 65px;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: red;
      display: block;
    }

    .detail-mode .count {
      display: none;
    }


  /* ================= DETAIL MODE ================= */
.detail-mode .grid {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  gap: 40px; /* Reduced gap */
  padding: 0;
  max-height: 95vh; /* Leave some breathing room */
  max-width: 95vw; /* Prevent horizontal overflow */
  overflow: visible; /* Let cards handle their own scrolling */
}


.detail-mode .card {
  width: 420px; /* Slightly smaller width */
  height: 85vh; /* Reduced height to fit screen */
  overflow-y: auto;
  flex-shrink: 0; /* Prevent cards from shrinking */
}


    /* ================= LOG STYLE ================= */
.log {
  font-size: 11px;
  margin-top: 4px; /* Small gap between logs */
  margin-bottom: 0;
  background: rgba(0, 0, 0, .5);
  padding: 6px;
  border-radius: 6px;
  display: none;
}

.log:first-of-type {
  margin-top: 150px;
}

.stageLogs {
  margin-top: 4px; /* Gap between the log header and stage logs */
  font-size: 9px;
  max-height: 80px;
  overflow-y: auto;
  color: #94a3b8;
  border-left: 2px solid #1e293b;
  padding-left: 6px;
  line-height: 1.3;
}

.detail-mode .log {
  display: block;
}

.detail-mode .stageLogs {
  display: block;
}

  </style>

</head>

<body>


  <!-- SPLASH -->

  <div id="splash"></div>

  <!-- MAIN DASHBOARD -->

  <div id="dashboard">

    <!-- STATUS TILE -->
    <div id="statusTile">
      Master: <span id="masterStatus">...</span>
      <br>
      Workers Free: <span id="workersCount">...</span>
    </div>


    <!-- TOTAL JOBS TILE -->
    <div id="totalJobsTile">
      Total Jobs:
      <span id="totalJobs">0</span>
    </div>


    <!-- DETAIL BUTTON -->
    <div id="detailBtn">
      DETAIL VIEW
    </div>


    <!-- JOB CARDS -->
    <div class="grid">
      <div id="queue" class="card">
        <div class="count" id="queueCount">0</div>
        <div id="queueLogs"></div>
      </div>

      <div id="active" class="card">
        <div class="count" id="activeCount">0</div>
        <div id="activeLogs"></div>
      </div>

      <div id="done" class="card">
        <div class="count" id="doneCount">0</div>
        <div id="doneLogs"></div>
      </div>
    </div>

  </div>


  <script>

    /* ================= SPLASH TRANSITION ================= */
    setTimeout(() => {
      document.getElementById("splash").style.opacity = 0;
      setTimeout(() => {
        document.getElementById("splash").remove();
        document.getElementById("dashboard").style.opacity = 1;
        animateCards();
      }, 1800);
    }, 3000);

    function animateCards() {
      const queueCard = document.getElementById("queue")
      const activeCard = document.getElementById("active")
      const doneCard = document.getElementById("done")

      setTimeout(() => queueCard.classList.add("show"), 400)
      setTimeout(() => activeCard.classList.add("show"), 900)
      setTimeout(() => doneCard.classList.add("show"), 1400)
    }


    /* ================= LOAD JOB DATA ================= */
    async function loadJobs() {
      try {
        let res = await fetch("/jobs");
        let jobs = await res.json();

        const queueLogs = document.getElementById("queueLogs")
        const activeLogs = document.getElementById("activeLogs")
        const doneLogs = document.getElementById("doneLogs")

        const queueCount = document.getElementById("queueCount")
        const activeCount = document.getElementById("activeCount")
        const doneCount = document.getElementById("doneCount")

        let q = 0;
        let a = 0;
        let d = 0;

        queueLogs.innerHTML = "";
        activeLogs.innerHTML = "";
        doneLogs.innerHTML = "";

        jobs.forEach(job => {
          let stageLogsHTML = ""

        if (job.stages) {
          job.stages.forEach(stage => {
            stageLogsHTML += `

          <div>
              <b>${stage.name}</b> : ${stage.status}
            <div class="stageLogs">
              ${(stage.logs || []).join("<br>")}
            </div>
          </div>
          `
          })
        }

        let log = `
          <div class="log">
           #${job._id} ${job.repo}
            ${stageLogsHTML}
          </div>
          `

          if (job.status === "QUEUED" || job.status === "WAITING_FOR_WORKER") {
            q++;
            queueLogs.insertAdjacentHTML("beforeend", log);
          }

          if (job.status === "RUNNING") {
            a++;
            activeLogs.insertAdjacentHTML("beforeend", log);
          }

          if (job.status === "COMPLETED") {
            d++;
            doneLogs.insertAdjacentHTML("beforeend", log);
          }
        });

        queueCount.innerText = q;
        activeCount.innerText = a;
        doneCount.innerText = d;
      } catch (err){
          console.log("Endpoint not available yet")
       }
    }

    setInterval(loadJobs, 1500);


    /* ================= SYSTEM STATUS ================= */
    async function loadSystem() {
      try {
        let workers = await fetch("/workers");
        workers = await workers.json();

        let server = await fetch("/server-status");
        server = await server.json();

        const workersCount = document.getElementById("workersCount")
        const masterStatus = document.getElementById("masterStatus")

        workersCount.innerText = workers.available;
        masterStatus.innerText = server.online ? "ONLINE" : "OFFLINE";
      } catch (err){
          console.log("Endpoint not available yet")
       }
    }

    setInterval(loadSystem, 4000);


    /* ================= TOTAL JOBS ================= */
    async function loadStats() {
      try {
        let res = await fetch("/stats");
        res = await res.json();
        const totalJobs = document.getElementById("totalJobs")
        totalJobs.innerText = res.totalJobs;
      } catch (err){
          console.log("Endpoint not available yet")
       }
    }

    setInterval(loadStats, 4000);

    loadJobs();
    loadSystem();
    loadStats();


    /* ================= DETAIL MODE ================= */

    document.getElementById("detailBtn").onclick = () => {
      document.body.classList.add("detail-mode");
    }


    /* ================= ESC EXIT DETAIL MODE ================= */
    document.addEventListener("keydown", e => {
      if (e.key === "Escape")
        document.body.classList.remove("detail-mode");
    });

  </script>
</body>
</html>
