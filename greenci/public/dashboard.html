<!DOCTYPE html>
<html>
<head>

<title>SmartCI Dashboard</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

.container {
  display: flex;
  gap: 20px;
}

.column {
  flex: 1;
  background: white;
  border-radius: 8px;
  padding: 15px;
  box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
}

.column h2 {
  text-align: center;
}

.job {
  background: #f9f9f9;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border-left: 5px solid gray;
}

.stage {
  font-size: 13px;
  margin-left: 5px;
  margin-top: 3px;
}

.running { color: orange; }
.completed { color: green; }
.pending { color: gray; }
.failed { color: red; }

.meta {
  font-size: 12px;
  margin-bottom: 5px;
  color: #555;
}

</style>

</head>

<body>

<h1>🚀 SmartCI Pipeline Dashboard</h1>

<div class="container">

<div class="column">
<h2>Queued</h2>
<div id="queued"></div>
</div>

<div class="column">
<h2>Running</h2>
<div id="progress"></div>
</div>

<div class="column">
<h2>Completed</h2>
<div id="completed"></div>
</div>

</div>

<script>

function getBorderColor(status) {
  if (status === "RUNNING") return "orange";
  if (status === "COMPLETED") return "green";
  if (status === "FAILED") return "red";
  return "gray";
}

async function loadJobs() {

  const res = await fetch("http://localhost:7000/jobs");
  const jobs = await res.json();

  document.getElementById("queued").innerHTML = "";
  document.getElementById("progress").innerHTML = "";
  document.getElementById("completed").innerHTML = "";

  jobs.forEach(job => {

    const div = document.createElement("div");
    div.className = "job";
    div.style.borderLeft = `5px solid ${getBorderColor(job.status)}`;

    let stages = "";

    if (job.stages) {
      job.stages.forEach(stage => {

        let className = "pending";

        if (stage.status === "RUNNING") className = "running";
        if (stage.status === "COMPLETED") className = "completed";
        if (stage.status === "FAILED") className = "failed";

        stages += `
          <div class="stage ${className}">
            ${stage.name} (${stage.command}): ${stage.status}
          </div>
        `;
      });
    }

    div.innerHTML = `
      <b>Job #${job.id}</b><br>
      Repo: ${job.repo}<br>
      Branch: ${job.branch}<br>

      <div class="meta">
        🌐 Language: ${job.language || "N/A"}<br>
        🧑‍💻 Worker: ${job.workerId || "Not Assigned"}<br>
        📊 Status: ${job.status}
      </div>

      ${stages}
    `;

    // ✅ Updated status handling
    if (job.status === "QUEUED" || job.status === "WAITING_FOR_WORKER") {
      document.getElementById("queued").appendChild(div);
    }

    if (job.status === "RUNNING") {
      document.getElementById("progress").appendChild(div);
    }

    if (job.status === "COMPLETED") {
      document.getElementById("completed").appendChild(div);
    }

  });

}

setInterval(loadJobs, 1000);

</script>

</body>
</html>
